name: Build ESP32 Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # permet un déclenchement manuel

env:
  # ⚙️ CONFIGURATION (modifiable)
  PLATFORM: espressif32
  BOARD: esp32dev
  PYTHON_VERSION: '3.10'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Cache PlatformIO
      uses: actions/cache@v3
      with:
        path: |
          ~/.platformio
          .pio
        key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
        
    - name: Install PlatformIO
      run: |
        pip install --upgrade pip
        pip install platformio
        
    - name: Install platform
      run: pio platform install ${{ env.PLATFORM }}
      
    - name: Install libraries
      run: pio lib install
      
    - name: Build firmware
      run: pio run -e ${{ env.BOARD }}
      
    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: firmware-${{ github.sha }}
        path: |
          .pio/build/${{ env.BOARD }}/firmware.bin
          .pio/build/${{ env.BOARD }}/firmware.elf
        retention-days: 7
        
    - name: Upload filesystem (optionnel)
      uses: actions/upload-artifact@v4
      with:
        name: filesystem-${{ github.sha }}
        path: .pio/build/${{ env.BOARD }}/spiffs.bin
        retention-days: 7
        if-no-files-found: ignore
